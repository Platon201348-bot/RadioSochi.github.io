<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>P2P чат без сервера</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #messages { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
    .msg { margin: 5px 0; }
    .msg.me { background: #e3f2fd; padding: 5px 10px; border-radius: 5px; }
    .msg.other { background: #f5f5f5; padding: 5px 10px; border-radius: 5px; }
    #inputArea { display: flex; gap: 5px; margin-top: 10px; }
    input { flex: 1; padding: 8px; }
    button { padding: 8px 15px; }
  </style>
</head>
<body>
  <h1>💬 P2P чат (без бэкенда)</h1>
  <p>Откройте эту страницу в двух вкладках. В первой — скопируйте ID, вставьте во вторую и подключитесь.</p>

  <label>ID собеседника (или нажмите "Создать ID"): 
    <button id="createIdBtn">Создать новый ID</button>
    <input type="text" id="remoteIdInput" placeholder="Вставьте ID собеседника">
    <button id="connectBtn">Подключиться</button>
  </label>

  <div id="myIdDisplay" style="margin: 10px 0; font-weight: bold; color: #0066cc;"></div>

  <div id="messages"></div>
  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
    <button id="sendBtn">Отправить</button>
  </div>

  <!-- Подключаем PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script>
    let peer = null;
    let conn = null;

    const messagesDiv = document.getElementById('messages');
    const remoteIdInput = document.getElementById('remoteIdInput');
    const myIdDisplay = document.getElementById('myIdDisplay');
    const createIdBtn = document.getElementById('createIdBtn');
    const connectBtn = document.getElementById('connectBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // 1. Создать новый Peer (новый ID)
    createIdBtn.onclick = () => {
      if (peer) peer.destroy();
      peer = new Peer(); // Создаёт уникальный ID

      peer.on('open', (id) => {
        myIdDisplay.textContent = `Ваш ID: ${id}`;
        remoteIdInput.value = id;
      });

      peer.on('connection', (c) => {
        addLog(`🚀 Подключение от ${c.peer}`);
        handleConnection(c);
      });
    };

    // 2. Подключиться к другому (клиент-клиент)
    connectBtn.onclick = async () => {
      if (!peer) peer = new Peer();

      const remoteId = remoteIdInput.value.trim();
      if (!remoteId) return alert('Введите ID собеседника');

      peer.on('open', () => {
        conn = peer.connect(remoteId);
        handleConnection(conn);
      });
    };

    // Обработка соединения (как клиент, так и сервер)
    function handleConnection(c) {
      if (conn && c !== conn) return; // Используем первое соединение

      conn = c;
      conn.on('open', () => {
        addLog('✅ Подключено! Теперь можно sending messages.');
      });
      conn.on('data', (data) => {
        addMessage(data, 'other');
      });
      conn.on('close', () => addLog('❌ Соединение разорвано'));
    }

    // Отправка
    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => if (e.key === 'Enter') sendMessage());

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !conn) return;

      conn.send(text);
      addMessage(text, 'me');
      messageInput.value = '';
    }

    // UI
    function addMessage(text, from) {
      const div = document.createElement('div');
      div.className = `msg ${from}`;
      div.textContent = from === 'me' ? `Я: ${text}` : `Собеседник: ${text}`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addLog(text) {
      const div = document.createElement('div');
      div.style.color = '#666';
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Авто создание ID при загрузке
    window.onload = () => {
      const btn = document.createElement('button');
      btn.textContent = 'Нажмите здесь, чтобы создать мой ID и начать';
      btn.style.margin = '5px 0';
      btn.onclick = createIdBtn.onclick;
      myIdDisplay.appendChild(btn);
    };
  </script>
</body>
</html>
